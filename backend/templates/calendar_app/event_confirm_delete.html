{% extends "base.html" %}

{% block title %}Termin loeschen - Klein Haitabu{% endblock %}

{% block content %}
  <section class="panel">
    <h1>Termin loeschen</h1>
    <p>Moechtest du den Termin "{{ object.title }}" wirklich loeschen?</p>
    <form method="post" class="form inline">
      {% csrf_token %}
      <button class="button danger" type="submit">Loeschen</button>
      <a class="button" href="{% url 'calendar:list' %}">Abbrechen</a>
    </form>
  </section>
{% endblock %}
